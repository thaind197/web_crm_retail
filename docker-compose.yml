services:
  db:
    image: postgres:16-alpine
    container_name: salescrm_db
    restart: always
    environment:
      POSTGRES_DB: SalesCRM
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d SalesCRM"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: salescrm_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: salescrm_backend
    restart: always
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=SalesCRM;Username=postgres;Password=postgres
      - JwtSettings__Secret=SuperSecretKeyForSalesCRMDemomMustBeAtLeast32BytesLong!
      - JwtSettings__Issuer=SalesCRM
      - JwtSettings__Audience=SalesCRMClient
      - JwtSettings__ExpiryDays=7
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: salescrm_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db-data:
  redis-data:
