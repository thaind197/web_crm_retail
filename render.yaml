services:
  - type: web
    name: sales-crm-backend
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: sales-crm-db
          property: connectionString

databases:
  - name: sales-crm-db
    plan: free
